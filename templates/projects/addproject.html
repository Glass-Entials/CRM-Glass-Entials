<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project | GlassEntials Staff Portal</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}?v=3\">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}?v=3\">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/customer.css') }}?v=3\">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo2.png') }}">
</head>
<body class="dashboard-page">
    
    <!-- Top Navbar -->
    {% include 'includes/navbar.html' %}

    <main class="container" style="max-width: 1000px; padding-top: 3rem;">
        <!-- Top Section -->
        <div class="top-bar" style="border-bottom: 2px solid rgba(212, 175, 55, 0.2); padding-bottom: 1.5rem; margin-bottom: 2rem;">
            <h1 style="color: var(--primary-color); font-size: 2rem; font-family: var(--font-heading);">Add New Project</h1>
            <a href="{{ url_for('projects.projects_list') }}" class="btn-action outline" style="text-decoration:none;">← Back to Projects</a>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(category_filter=["projecterror"]) %}
          {% if messages %}
            {% for message in messages %}
            <div class="flash-message" style="padding: 15px; background-color: rgba(139, 0, 0, 0.04); border-left: 4px solid rgba(139, 0, 0, 0.5); font-family: var(--font-body); color: #8b0000; display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; border-radius: 4px;">
              <span style="font-size: 1.2rem; line-height: 1;">⚠</span> {{ message }}
            </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Add Form Container -->
        <div class="form-container" style="animation: none;">
            <div class="panel" style="border-top: 4px solid var(--accent-gold);">
                <form action="{{ url_for('projects.add_project') }}" method="POST" class="customer-form" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Project Name <span style="color: red; opacity: 0.7;">*</span></label>
                            <input type="text" name="name" class="form-control" placeholder="e.g. Skyline Mall Glass Installation" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Customer</label>
                            <div style="position: relative;">
                                <input type="hidden" name="customer_id" id="customer_id" value="{{ pre_selected_customer_id if pre_selected_customer_id else 'none' }}">
                                <input type="text" id="customer_search" class="form-control" placeholder="Search customer..." autocomplete="off">
                                <ul id="customer_dropdown" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; border-radius: 4px; max-height: 250px; overflow-y: auto; z-index: 1000; list-style: none; padding: 0; margin: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                                </ul>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select name="status" class="form-control" required>
                                <option value="Planning" selected>Planning</option>
                                <option value="In Progress">In Progress</option>
                                <option value="On Hold">On Hold</option>
                                <option value="Completed">Completed</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Work Type</label>
                            <select name="work_type" class="form-control" required>
                                <option value="Glass" selected>🪟 Glass</option>
                                <option value="Hardware">🔩 Hardware</option>
                                <option value="Mirror">🪞 Mirror</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Category</label>
                            <select name="category" class="form-control" required>
                                <option value="Commercial" selected>🏢 Commercial</option>
                                <option value="Residential">🏠 Residential</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Assigned To</label>
                            <select name="assigned_to" class="form-control">
                                <option value="unassigned">Unassigned</option>
                                {% for emp in employees %}
                                    <option value="{{ emp.id }}" {% if current_user.employee and current_user.employee.id == emp.id %}selected{% endif %}>{{ emp.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Project Document (Optional)</label>
                            <input type="file" name="file" class="form-control" style="padding: 0.6rem; background: #f9fbfd;">
                        </div>
                        
                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea name="description" class="form-control" rows="3" placeholder="Detailed description of the project scope..."></textarea>
                        </div>
                    </div>
                    <div style="display:flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                        <a href="{{ url_for('projects.projects_list') }}" class="btn-action outline" style="text-decoration:none;">Cancel</a>
                        <button type="submit" class="btn-action dark">Save Project</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const customers = [
            {% for cus in customers %}
            { id: "{{ cus.id }}", name: "{{ cus.name | replace('\"', '\\\"') }}", company: "{{ (cus.company if cus.company else 'N/A') | replace('\"', '\\\"') }}" }{% if not loop.last %},{% endif %}
            {% endfor %}
        ];

        const searchInput = document.getElementById('customer_search');
        const hiddenInput = document.getElementById('customer_id');
        const dropdown = document.getElementById('customer_dropdown');
        const addCustomerUrl = "{{ url_for('customers.add_customer') }}";

        // Initialize pre-selected customer if any
        const preSelectedId = hiddenInput.value;
        if (preSelectedId && preSelectedId !== 'none') {
            const selectedCust = customers.find(c => c.id == preSelectedId);
            if (selectedCust) {
                searchInput.value = `${selectedCust.name} (${selectedCust.company})`;
            }
        } else {
            searchInput.value = 'None';
        }

        function renderDropdown(searchTerm = '') {
            dropdown.innerHTML = '';
            
            // Add "None" option
            const noneLi = document.createElement('li');
            noneLi.textContent = 'None';
            noneLi.style.cssText = 'padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; transition: background 0.2s;';
            noneLi.onmouseover = () => noneLi.style.background = '#f9f9f9';
            noneLi.onmouseout = () => noneLi.style.background = 'white';
            noneLi.onclick = () => {
                hiddenInput.value = 'none';
                searchInput.value = 'None';
                dropdown.style.display = 'none';
            };
            dropdown.appendChild(noneLi);

            // Filter customers
            const filtered = customers.filter(c => {
                const searchStr = `${c.name} ${c.company}`.toLowerCase();
                return searchStr.includes(searchTerm.toLowerCase());
            });

            // Add filtered customer options
            filtered.forEach(c => {
                const li = document.createElement('li');
                li.textContent = `${c.name} (${c.company})`;
                li.style.cssText = 'padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; transition: background 0.2s;';
                li.onmouseover = () => li.style.background = '#f9f9f9';
                li.onmouseout = () => li.style.background = 'white';
                li.onclick = () => {
                    hiddenInput.value = c.id;
                    searchInput.value = `${c.name} (${c.company})`;
                    dropdown.style.display = 'none';
                };
                dropdown.appendChild(li);
            });

            // Add "Create new customer" option
            if (searchTerm.trim() !== '' && searchTerm.trim().toLowerCase() !== 'none') {
                const createLi = document.createElement('li');
                createLi.innerHTML = `<span style="color: var(--accent-gold); font-weight: 600;">+ Create new customer with name "${searchTerm}"</span>`;
                createLi.style.cssText = 'padding: 10px 15px; cursor: pointer; transition: background 0.2s; background: #fffdfa;';
                createLi.onmouseover = () => createLi.style.background = '#f2ecd8';
                createLi.onmouseout = () => createLi.style.background = '#fffdfa';
                createLi.onclick = () => {
                    window.location.href = `${addCustomerUrl}?prefill_name=${encodeURIComponent(searchTerm)}`;
                };
                dropdown.appendChild(createLi);
            }
        }

        searchInput.addEventListener('focus', () => {
            if (searchInput.value === 'None') searchInput.value = '';
            renderDropdown(searchInput.value);
            dropdown.style.display = 'block';
        });

        searchInput.addEventListener('input', (e) => {
            renderDropdown(e.target.value);
            dropdown.style.display = 'block';
        });

        // Hide dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (e.target !== searchInput && e.target !== dropdown) {
                dropdown.style.display = 'none';
                // Reset search text if no customer is matched
                if (hiddenInput.value === 'none') {
                    searchInput.value = 'None';
                } else {
                    const sel = customers.find(c => c.id == hiddenInput.value);
                    if (sel) searchInput.value = `${sel.name} (${sel.company})`;
                }
            }
        });
    </script>
</body>
</html>
