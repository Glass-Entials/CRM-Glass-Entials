<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed | GlassEntials Staff Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}?v=3">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}?v=3">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo2.png') }}">
    <style>
        .status-card {
            text-align: center;
            padding: 1rem 0 0.5rem;
        }
        .status-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(16,185,129,0.1);
            border: 2px solid rgba(16,185,129,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes popIn {
            0%   { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .status-card h2 {
            font-family: var(--font-heading);
            color: var(--primary-color);
            font-size: 1.75rem;
            margin-bottom: 0.75rem;
        }
        .status-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .countdown {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <a href="/auth/login" class="logo-link">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="GlassEntials Logo" class="site-logo">
                </a>
                <span class="crm-badge">Staff</span>
            </div>
        </div>

        <div class="status-card">
            <div class="status-icon">✅</div>
            <h2>Password Changed!</h2>
            <p>Your password has been updated successfully. You can now log in with your new credentials.</p>
            <a href="{{ url_for('auth.login') }}" class="auth-btn" style="display:block;text-decoration:none;text-align:center;">
                Return to Login
            </a>
            <p class="countdown" id="countdown">Redirecting in <strong>5</strong> seconds…</p>
        </div>
    </div>

    <script>
        let sec = 5;
        const strong = document.querySelector('.countdown strong');
        const timer = setInterval(() => {
            sec--;
            strong.textContent = sec;
            if (sec <= 0) {
                clearInterval(timer);
                window.location.href = "{{ url_for('auth.login') }}";
            }
        }, 1000);
    </script>
</body>
</html>
