<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Sent | GlassEntials Staff Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}?v=3">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}?v=3">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo2.png') }}">
    <style>
        .status-card { text-align: center; padding: 1rem 0 0.5rem; }
        .status-icon {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(212,175,55,0.1);
            border: 2px solid rgba(212,175,55,0.35);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; margin: 0 auto 1.5rem;
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes popIn { 0%{transform:scale(0);opacity:0;} 100%{transform:scale(1);opacity:1;} }
        .status-card h2 { font-family: var(--font-heading); color: var(--primary-color); font-size: 1.75rem; margin-bottom: 0.75rem; }
        .status-card p  { color: var(--text-muted); font-size: 0.95rem; line-height: 1.65; margin-bottom: 1rem; }
        .info-pill {
            display: inline-block; padding: 6px 18px; border-radius: 20px;
            background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3);
            font-size: 0.85rem; font-weight: 600; color: var(--primary-color); margin-bottom: 1.5rem;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <a href="/auth/login" class="logo-link">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="GlassEntials Logo" class="site-logo">
                </a>
                <span class="crm-badge">Staff</span>
            </div>
        </div>
        <div class="status-card">
            <div class="status-icon">📬</div>
            <div class="info-pill">Pending Approval</div>
            <h2>Request Sent!</h2>
            <p>Hi <strong>{{ display_name }}</strong>, your request to join <strong>{{ org_name }}</strong> has been sent to the organization administrator.</p>
            <p>Your account will become active once the administrator approves your request. You'll be able to log in with Google at that point.</p>
            <a href="{{ url_for('auth.login') }}" class="auth-btn" style="display:block;text-decoration:none;text-align:center;margin-top:1.5rem;">
                Back to Login
            </a>
        </div>
    </div>
</body>
</html>
