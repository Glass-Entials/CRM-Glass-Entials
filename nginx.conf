# Nginx configuration for GlassEntials CRM
# Place at: /etc/nginx/sites-available/glassentials
# Enable with: ln -s /etc/nginx/sites-available/glassentials /etc/nginx/sites-enabled/
# Test with:   nginx -t
# Reload with: systemctl reload nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=300r/m;

# Upstream Gunicorn cluster
upstream glassentials_app {
    server 127.0.0.1:8000 fail_timeout=0;
    # Add more workers for load balancing:
    # server 127.0.0.1:8001 fail_timeout=0;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name glassentials.in www.glassentials.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name glassentials.in www.glassentials.in;

    # ─── SSL ───────────────────────────────────────────────────────────────────
    # IMPORTANT: Comment out these lines on initial boot.
    # After starting Nginx, run `certbot --nginx -d YOUR_DOMAIN.COM` to generate certs.
    ssl_certificate     /etc/letsencrypt/live/glassentials.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glassentials.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (2 years, includes subdomains)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ─── File Upload Limit ─────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ─── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/glassentials_access.log;
    error_log  /var/log/nginx/glassentials_error.log warn;

    # ─── Health Check (bypass rate limit) ─────────────────────────────────────
    location = /health {
        proxy_pass         http://glassentials_app;
        proxy_set_header   Host $host;
        access_log off;
    }

    # ─── Login Rate Limiting ───────────────────────────────────────────────────
    location ~ ^/(login|auth/login|register|auth/register) {
        limit_req zone=login burst=3 nodelay;
        proxy_pass         http://glassentials_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Document Preview (allow embedding on same origin) ────────────────────
    location ~ ^/view-document/ {
        limit_req zone=general burst=20 nodelay;

        proxy_pass         http://glassentials_app;
        proxy_redirect     off;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Strip any X-Frame-Options header sent by Flask
        proxy_hide_header X-Frame-Options;

        # Allow this route to be embedded in the same site (overrides global DENY)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ─── Static Files (served directly by Nginx) ───────────────────────────────
    location /static/ {
        alias      /var/www/CRM-Glass-Entials/static/;
        expires    30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ─── Main Application ──────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass         http://glassentials_app;
        proxy_redirect     off;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        # Buffer tuning
        proxy_buffer_size          4k;
        proxy_buffers              8 4k;
        proxy_busy_buffers_size    8k;
    }

    # ─── Block Sensitive Paths ─────────────────────────────────────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
}
