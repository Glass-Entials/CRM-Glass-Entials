# -----------------------------
# Rate Limit Zones
# -----------------------------
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=600r/m;

limit_req_status 429;

# -----------------------------
# WebSocket Upgrade
# -----------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# -----------------------------
# Upstream
# -----------------------------
upstream glassentials_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# -----------------------------
# HTTP -> HTTPS
# -----------------------------
server {
    listen 80;
    listen [::]:80;

    server_name glassentials.in www.glassentials.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------
# HTTPS Server
# -----------------------------
server {

    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name glassentials.in www.glassentials.in;

    ssl_certificate /etc/letsencrypt/live/glassentials.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glassentials.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;

    access_log /var/log/nginx/glassentials_access.log;
    error_log /var/log/nginx/glassentials_error.log warn;

    # -------------------------
    # Health
    # -------------------------

    location = /health {

        proxy_pass http://glassentials_app;
        proxy_set_header Host $host;
        access_log off;

    }

    # -------------------------
    # Login
    # -------------------------

    location ~ ^/(login|auth/login|register|auth/register) {

        limit_req zone=login burst=5 nodelay;

        proxy_pass http://glassentials_app;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }

    # -------------------------
    # Static
    # -------------------------

    location /static/ {

        alias /var/www/CRM-Glass-Entials/static/;

        expires 30d;

        add_header Cache-Control "public, immutable";

    }

    # -------------------------
    # Socket.IO
    # -------------------------

    location /socket.io/ {

        proxy_pass http://glassentials_app;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;

    }

    # -------------------------
    # Main App
    # -------------------------

    location / {

        limit_req zone=general burst=100;

        proxy_pass http://glassentials_app;

        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_read_timeout 120;

    }

    # -------------------------
    # Protected Files
    # -------------------------

    location ~ /\.(env|git|htaccess) {

        deny all;
        return 404;

    }

}