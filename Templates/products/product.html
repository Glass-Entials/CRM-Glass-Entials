<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | GlassEntials Staff Portal</title>
     <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/customer.css') }}">
</head>
<body class="dashboard-page">

    <!--Top Navbar-->
    <header class="dash-nav">
        <div class="logo">
            <a href="/home" class="logo-link">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="GlassEntials Logo" class="site-logo">
            </a>
        </div>

        <nav class="dash-menu">
    <a href="{{ url_for('home_page') }}" {% if request.endpoint == 'home_page' %}class="active"{% endif %}>Dashboard</a>
    <a href="{{ url_for('customers.customers_list') }}" {% if request.blueprint == 'customers' %}class="active"{% endif %}>Customers</a>
    <div class="dropdown">
        <a href="#" {% if request.blueprint == 'leads' %}class="active"{% endif %}>Leads ▾</a>
        <div class="dropdown-content">
            <a href="{{ url_for('leads.leads_list') }}">All Leads</a>
            <a href="{{ url_for('leads.all_follow_ups') }}">📞 Follow-Ups</a>
        </div>
    </div>
    <a href="{{ url_for('projects.projects_list') }}" {% if request.blueprint == 'projects' %}class="active"{% endif %}>Projects</a>
    
    <div class="dropdown">
        <a href="#" {% if request.blueprint == 'tasks' %}class="active"{% endif %}>Tasks ▾</a>
        <div class="dropdown-content">
            <a href="{{ url_for('tasks.tasks_list') }}">All Tasks</a>
            <a href="{{ url_for('tasks.daily_tasks_list') }}">Daily Tasks</a>
        </div>
    </div>

    <div class="dropdown">
        <a href="#" {% if request.blueprint == 'accounts' or request.blueprint == 'quotations' or request.blueprint == 'expenses' %}class="active"{% endif %}>Accounts ▾</a>
        <div class="dropdown-content">
            <a href="{{ url_for('accounts.invoice_list') }}">Invoice</a>
            <a href="{{ url_for('quotations.quotation_list') }}">Quotations</a>
            <a href="{{ url_for('expenses.expenses_list') }}">Expenses</a>
        </div>
    </div>

    <a href="#" {% if request.blueprint == 'products' %}class="active"{% endif %}>Products</a>
    
    <div class="dropdown">
        <a href="#" {% if request.blueprint == 'employees' %}class="active"{% endif %}>Settings ▾</a>
        <div class="dropdown-content">
            <a href="{{ url_for('employees.employee_list') }}">Employee Portal</a>
        </div>
    </div>
</nav>
    </header>
    
</body>
</html>
