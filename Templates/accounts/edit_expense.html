<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense | GlassEntials</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <style>
        .edit-container { max-width: 600px; margin: 4rem auto; padding: 2.5rem; background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid rgba(212,175,55,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-weight: 700; margin-bottom: 0.5rem; color: var(--primary-color); font-size: 0.9rem; }
        .form-control { width: 100%; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid rgba(13,27,42,0.1); font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .form-control:focus { border-color: var(--accent-gold); }
        .btn-save { background: var(--accent-gold); color: white; padding: 0.8rem 2rem; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; width: 100%; margin-top: 1rem; }
    </style>
</head>
<body style="background: #f8fafc;">
    <div class="edit-container">
        <h2 style="font-family: 'Playfair Display', serif; color: var(--primary-color); margin-bottom: 1.5rem;">Edit Expense Submission</h2>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Expense Title</label>
                <input type="text" name="title" class="form-control" value="{{ expense.title }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Amount (₹)</label>
                <input type="number" step="0.01" name="amount" class="form-control" value="{{ expense.amount }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select name="category" class="form-control">
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if expense.category_display == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Associated Project</label>
                <select name="project_id" class="form-control">
                    <option value="none">General / No Project</option>
                    {% for proj in projects %}
                    <option value="{{ proj.id }}" {% if expense.project_id == proj.id %}selected{% endif %}>{{ proj.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ expense.description }}</textarea>
            </div>
            <button type="submit" class="btn-save">Save Changes</button>
            <a href="{{ url_for('expenses.expenses_list') }}" style="display: block; text-align: center; margin-top: 1rem; color: var(--text-muted); text-decoration: none; font-weight: 600;">Cancel</a>
        </form>
    </div>
</body>
</html>
